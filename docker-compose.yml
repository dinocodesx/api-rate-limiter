services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: api_rate_limiter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api-key:
    build:
      context: ./packages/api-key
    environment:
      PORT: "8080"
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me
      TOKEN_ISSUER: api-key-service
    depends_on:
      - redis
    ports:
      - "8080:8080"

  rate-limiter:
    build:
      context: ./packages/rate-limiter
    environment:
      PORT: "8081"
      REDIS_ADDR: redis:6379
      JWT_SECRET: change-me
      EXPECTED_ISSUER: api-key-service
    depends_on:
      - redis
    ports:
      - "8081:8081"

volumes:
  postgres_data:
  redis_data:
